name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: SUPABASE_ANON_KEY secret is empty or not set!"
            exit 1
          else
            echo "Secret is set, length: ${#SECRET}"
          fi
        env:
          SECRET: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Ping Supabase project
        run: |
          curl -v \
            "https://bigivbaxpijrcgzymfoc.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
