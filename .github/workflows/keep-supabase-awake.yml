name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase project
        run: |
          curl -v \
            "https://bigivbaxpijrcgzymfoc.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Update heartbeat file
        run: |
          mkdir -p .github/heartbeat
          date -u "+%Y-%m-%d %H:%M:%S UTC" > .github/heartbeat/last-ping.txt

      - name: Commit heartbeat file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat/last-ping.txt
          git diff --staged --quiet || git commit -m "chore: keep-alive heartbeat"
          git push
